function sumBy(arr,key,val){const m={};arr.forEach(f=>{m[f[key]]=(m[f[key]]||0)+(val?f[val]:1)});return m;}

/* KPIs */
document.getElementById('kpis').innerHTML=[
 ['37 wks','Duration &middot; Aug 2026&ndash;Apr 2027'],
 ['Mar 29 2027','Phase 1 Go-Live'],
 [fmt(D.totHrs)+' hrs','Total effort'],
 [money(D.totCost),'Investment @ $'+D.rate+'/hr'],
 [D.feats.length,'Features / backlog items'],
 ['8 roles','Blended delivery team'],
].map(k=>`<div class="kpi"><div class="v">${k[0]}</div><div class="l">${k[1]}</div></div>`).join('');

/* Tabs */
const TABS=[['overview','Overview'],['timeline','Timeline'],['scope','Scope & Effort'],['cost','Team & Cost']];
const tabsEl=document.getElementById('tabs');
TABS.forEach((t,i)=>{const b=document.createElement('button');b.className='tab'+(i==0?' active':'');b.textContent=t[1];
 b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');
 document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));document.getElementById('s-'+t[0]).classList.add('active');window.scrollTo(0,0);};
 tabsEl.appendChild(b);});

/* ---------- OVERVIEW ---------- */
(function(){
 const steps=[['Define','Joint Visioning & Mobilization','#2E75B6','4 wks'],['Create','JPD 1&ndash;6 &middot; CRP 1/2 &middot; UAT','#7030A0','~26 wks'],['Deploy','Cutover & Go-Live','#C0392B','3 wks'],['Empower','Hypercare','#548235','3 wks']];
 let stepper='<div class="stepper">'+steps.map((s,i)=>`<div class="step" style="background:${s[2]}">${s[0]}<small>${s[1]}</small><small style="opacity:.8">${s[3]}</small></div>`+(i<steps.length-1?'<span class="arrow">&rsaquo;</span>':'')).join('')+'</div>';
 const byTeam=sumBy(D.feats,'team','total'), byStatus=sumBy(D.feats,'status','total');
 const teamBars=Object.keys(TEAMN).map(t=>({l:TEAMN[t],v:byTeam[t]||0,c:TEAMC[t]}));
 const stBars=['Sell to Deliver','Quick Wins','Proven Process'].map(s=>({l:s,v:byStatus[s]||0,c:STATC[s]}));
 const mx=Math.max(...teamBars.map(b=>b.v),...stBars.map(b=>b.v));
 const bhtml=arr=>arr.map(b=>`<div class="barrow"><div class="bl">${b.l}</div><div class="bwrap"><div class="bf" style="width:${(b.v/mx*100).toFixed(1)}%;background:${b.c}"></div></div><div class="bt">${fmt(b.v)}</div></div>`).join('');
 document.getElementById('s-overview').innerHTML=`
 <div class="card"><h2>Phase 1 at a glance</h2>
 <p class="muted" style="margin:0 0 14px;line-height:1.6">Phase 1 stands up Dynamics 365 Project Operations in a <b>new Dataverse environment integrated with Finance &amp; Operations</b>, covering the won-sale&rarr;billing core plus the two cross-environment bridges (Won-Opportunity and Case-to-Project). Delivered on the Stoneridge Proven Process &mdash; <b>Define &middot; Create &middot; Deploy &middot; Empower</b>: a <b>Define</b> visioning phase; a <b>Create</b> phase of six iterative Joint Process Design sprints with two Conference Room Pilots and UAT; <b>Deploy</b> (go-live 29&nbsp;Mar&nbsp;2027); and <b>Empower</b> hypercare.</p>
 ${stepper}</div>
 <div class="grid2">
  <div class="card"><h2>Effort by team</h2>${bhtml(teamBars)}<div class="note">Blended rate $${D.rate}/hr &middot; total ${fmt(D.totHrs)} hrs &middot; ${money(D.totCost)}.</div></div>
  <div class="card"><h2>Effort by work type</h2>${bhtml(stBars)}<div class="note"><b>Sell&nbsp;to&nbsp;Deliver</b> = the product build &middot; <b>Quick&nbsp;Wins</b> = in-place fixes on today's system &middot; <b>Proven&nbsp;Process</b> = visioning, design, CRP/UAT &amp; deployment.</div></div>
 </div>
 <div class="card"><h2>Top epics by effort</h2><div id="ov-epics"></div></div>`;
 const byEpic=sumBy(D.feats,'epic','total');
 const top=Object.entries(byEpic).sort((a,b)=>b[1]-a[1]).slice(0,10);
 const emx=top[0][1];
 document.getElementById('ov-epics').innerHTML=top.map(([e,v])=>`<div class="barrow"><div class="bl" style="width:300px">${e}</div><div class="bwrap"><div class="bf" style="width:${(v/emx*100).toFixed(1)}%;background:var(--purple)"></div></div><div class="bt">${fmt(v)}</div></div>`).join('');
})();

/* ---------- TIMELINE ---------- */
(function(){
 const NW=D.nw, pct=w=>((w-1)/NW*100), wpc=n=>(n/NW*100);
 let months='<tr><th class="growlab" style="background:var(--navy);color:#fff">PHASE</th>';
 D.months.forEach(m=>{months+=`<th class="gmonth" colspan="${m[1]}">${m[0]}</th>`;});
 months+='</tr>';
 let wkrow='<tr><th class="growlab" style="font-size:9px;color:var(--muted)">weeks &rarr;</th>';
 for(let w=1;w<=NW;w++)wkrow+=`<td class="gwk">${w}</td>`;
 wkrow+='</tr>';
 // freeze columns overlay via a background row is tricky; we draw freeze inside each cell row using absolute bands over full table using a spanning row
 function barRow(item){
  let row=`<tr><td class="growlab">${item.name}</td><td class="gcell" colspan="${NW}"><div style="position:relative;height:26px">`;
  // freeze bands
  D.freeze.forEach(fw=>{row+=`<div class="freezecol" style="left:${pct(fw)}%;width:${wpc(1)}%"></div>`;});
  const left=pct(item.s), width=wpc(item.e-item.s+1);
  row+=`<div class="bar" style="left:${left}%;width:${width}%;background:${CAT[item.cat]}" data-tip="${encodeURIComponent(JSON.stringify({t:item.name,m:(item.start?item.start+' – '+item.end+' · '+item.wks+' wks':CATNAME[item.cat]),d:item.desc}))}">${item.short||''}</div>`;
  row+='</div></td></tr>';
  return row;
 }
 let rows=D.timeline.map(barRow).join('');
 // continuous
 rows+=`<tr><td class="growlab" colspan="${NW+1}" style="background:var(--navy);color:#fff;font-size:10px;letter-spacing:.5px;position:static;border-right:none">CONTINUOUS WORKSTREAMS</td></tr>`;
 rows+=D.cont.map(barRow).join('');
 // milestone lane
 let mrow=`<tr class="mrow"><td class="growlab" style="font-size:10.5px">&#9670; Milestones / Gates</td><td class="gcell" colspan="${NW}"><div style="position:relative;height:20px">`;
 D.milestones.forEach((ms,i)=>{mrow+=`<div class="mdiamond" style="left:${pct(ms.wk)+wpc(0.5)}%;color:${ms.star?'#C0392B':'var(--navy)'}" data-tip="${encodeURIComponent(JSON.stringify({t:(ms.star?'★ ':'◆ ')+ms.name,m:ms.date+' · Week '+ms.wk+' · '+ms.stage,d:''}))}">${ms.star?'★':'◆'}</div>`;});
 mrow+='</div></td></tr>';
 rows+=mrow;
 const legendItems=Object.keys(CAT).map(c=>`<span class="it"><span class="sw" style="background:${CAT[c]}"></span>${CATNAME[c]}</span>`).join('')+`<span class="it"><span class="sw" style="background:repeating-linear-gradient(45deg,#969eaf,#969eaf 3px,#c9cedb 3px,#c9cedb 6px)"></span>Holiday freeze</span>`;
 document.getElementById('s-timeline').innerHTML=`<div class="card"><h2>Delivery timeline &mdash; Aug 2026 to Apr 2027</h2>
 <div class="gantt"><table class="gtable">${months}${wkrow}${rows}</table></div>
 <div class="legend">${legendItems}</div>
 <div class="note">${D.freezeNote} &nbsp;Hover any bar or milestone for detail.</div></div>
 <div class="card"><h2>Milestones &amp; gates</h2><div id="ms-list"></div></div>`;
 document.getElementById('ms-list').innerHTML=`<div class="ft" style="grid-template-columns:24px 1fr auto auto;font-weight:700;color:var(--navy);border:none"><div></div><div>Milestone</div><div>Stage</div><div>Target</div></div>`+
  D.milestones.map(m=>`<div class="ft" style="grid-template-columns:24px 1fr auto auto"><div style="color:${m.star?'#C0392B':'var(--navy)'};font-size:15px">${m.star?'★':'◆'}</div><div class="fn">${m.name}</div><div><span class="tag" style="background:var(--purple)">${m.stage}</span></div><div class="fh">${m.date} &middot; W${m.wk}</div></div>`).join('');
 attachTips();
})();

/* ---------- SCOPE ---------- */
(function(){
 let fTeam='All', fStat='All', q='';
 const teams=['All','CE','FO','Data'], stats=['All','Sell to Deliver','Quick Wins','Proven Process'];
 const host=document.getElementById('s-scope');
 host.innerHTML=`<div class="card"><h2>Scope &amp; effort explorer</h2>
  <div class="controls"><span class="muted" style="font-size:11px;font-weight:700">TEAM</span><span id="tf"></span>
   <span class="muted" style="font-size:11px;font-weight:700;margin-left:8px">WORK</span><span id="sf"></span>
   <input type="search" id="q" placeholder="search features…" style="margin-left:auto"></div>
  <div id="epics"></div></div>`;
 function chips(host2,arr,cur,cb){document.getElementById(host2).innerHTML='';arr.forEach(a=>{const c=document.createElement('span');c.className='chip'+(a==cur?' on':'');c.innerHTML=a==='All'?'All':(host2==='tf'?TEAMN[a]||a:a);c.onclick=()=>cb(a);document.getElementById(host2).appendChild(c);});}
 function render(){
  chips('tf',teams,fTeam,v=>{fTeam=v;render();});
  chips('sf',stats,fStat,v=>{fStat=v;render();});
  let fs=D.feats.filter(f=>(fTeam==='All'||f.team===fTeam)&&(fStat==='All'||f.status===fStat)&&(!q||(f.title+f.epic+f.note).toLowerCase().includes(q)));
  const epics={};fs.forEach(f=>{(epics[f.epic]=epics[f.epic]||[]).push(f);});
  const EORD=D.epicOrder||[];
  const oidx=e=>{const i=EORD.indexOf(e);return i<0?900:i;};
  const order=Object.entries(epics).sort((a,b)=>{const d=oidx(a[0])-oidx(b[0]);return d||(b[1].reduce((s,x)=>s+x.total,0)-a[1].reduce((s,x)=>s+x.total,0));});
  const gmax=Math.max(1,...order.map(([e,a])=>a.reduce((s,x)=>s+x.total,0)));
  const tot=fs.reduce((s,x)=>s+x.total,0);
  let h=`<div class="note" style="margin:0 0 10px"><b>${fs.length}</b> features &middot; <b>${fmt(tot)}</b> hrs &middot; <b>${money(fs.reduce((s,x)=>s+x.cost,0))}</b></div>`;
  h+=order.map(([e,arr])=>{const eh=arr.reduce((s,x)=>s+x.total,0);
   return `<div class="epic"><div class="eh" data-toggle="1">
    <span style="color:var(--muted)">▸</span><span class="en">${e}</span>
    <div class="ebar" style="width:${(eh/gmax*120+3).toFixed(0)}px"></div><span class="eb">${arr.length} feat &middot; ${fmt(eh)} hrs</span></div>
    <div class="feat">${arr.sort((a,b)=>b.total-a.total).map(f=>`<div class="ft"><div><div class="fn">${f.title}</div>${f.note?`<div class="fnote">${f.note}</div>`:''}</div>
     <div><span class="tag" style="background:${TEAMC[f.team]||'#888'}">${f.team}</span> <span class="tag" style="background:${STATC[f.status]||'#888'}">${f.status.replace('Sell to Deliver','Build')}</span></div>
     <div class="fh">${fmt(f.total)}h</div></div>`).join('')}</div></div>`;}).join('');
  document.getElementById('epics').innerHTML=h;
 }
 document.getElementById('q').addEventListener('input',e=>{q=e.target.value.toLowerCase();render();});
 document.getElementById('epics').addEventListener('click',e=>{const eh=e.target.closest('.eh');if(eh)eh.parentNode.classList.toggle('open');});
 render();
})();

/* ---------- COST ---------- */
(function(){
 const byTeam=sumBy(D.feats,'team','total'),cTeam=sumBy(D.feats,'team','cost');
 const byStage=sumBy(D.feats,'stage','total');
 const byStatus=sumBy(D.feats,'status','total'),cStatus=sumBy(D.feats,'status','cost');
 const byEpic=sumBy(D.feats,'epic','total');
 function bars(map,colorFn,fmtv,ord){let ent=Object.entries(map);ent=ord?ent.sort((a,b)=>ord.indexOf(a[0])-ord.indexOf(b[0])):ent.sort((a,b)=>b[1]-a[1]);const mx=Math.max(...ent.map(e=>e[1]));
  return ent.map(([k,v])=>`<div class="barrow"><div class="bl">${k}</div><div class="bwrap"><div class="bf" style="width:${(v/mx*100).toFixed(1)}%;background:${colorFn(k)}"></div></div><div class="bt">${fmtv(v)}</div></div>`).join('');}
 document.getElementById('s-cost').innerHTML=`
 <div class="card"><h2>Investment summary</h2>
  <div class="kpis" style="margin:0">
   ${[[fmt(D.totHrs)+' hrs','Total effort'],[money(D.totCost),'Total investment'],['$'+D.rate+'/hr','Blended rate'],[fmt(Math.round(D.totHrs/8)),'Person-days'],[fmt(byStatus['Proven Process']||0)+' hrs','Delivery lifecycle'],[fmt(byStatus['Quick Wins']||0)+' hrs','Quick Wins']].map(k=>`<div class="kpi" style="background:#f4f6fa;border-color:var(--line);color:var(--ink)"><div class="v" style="color:var(--navy)">${k[0]}</div><div class="l" style="color:var(--muted)">${k[1]}</div></div>`).join('')}
  </div></div>
 <div class="grid2">
  <div class="card"><h2>Hours &amp; cost by team</h2>${bars(cTeam,k=>TEAMC[k]||'#888',money)}<div class="note">CE Team carries the Project Operations build &amp; integrations; F&O the finance/forecasting; Data the Power BI reporting layer.</div></div>
  <div class="card"><h2>Hours by proven-process stage</h2>${bars(byStage,k=>({Define:'#2E75B6',Create:'#7030A0',Deploy:'#C0392B',Empower:'#548235'}[k]||'#888'),v=>fmt(v)+'h',['Define','Create','Deploy','Empower'])}</div>
 </div>
 <div class="card"><h2>Hours by work type</h2>${bars(byStatus,k=>STATC[k]||'#888',v=>fmt(v)+'h')}</div>
 <div class="card"><h2>Hours by epic (all ${Object.keys(byEpic).length})</h2>${bars(byEpic,()=>'#7030A0',v=>fmt(v)+'h')}</div>`;
})();

/* Tooltip */
function attachTips(){
 const tip=document.getElementById('tip');
 document.querySelectorAll('[data-tip]').forEach(el=>{
  el.addEventListener('mousemove',e=>{const d=JSON.parse(decodeURIComponent(el.dataset.tip));
   tip.innerHTML=`<div class="tt">${d.t}</div><div class="tm">${d.m}</div>${d.d?`<div>${d.d}</div>`:''}`;
   tip.classList.add('show');let x=e.clientX+14,y=e.clientY+14;
   if(x+310>innerWidth)x=e.clientX-310;if(y+120>innerHeight)y=innerHeight-130;tip.style.left=x+'px';tip.style.top=y+'px';});
  el.addEventListener('mouseleave',()=>tip.classList.remove('show'));});
}
</script></body></html>
